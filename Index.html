<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">

    <title>Media Querie</title>
</head>
<body>
    <section id="header">
    <div id="titles">
        <h1>My app</h1>
    </div>
    <div id="icons-header">
    <i class="fa-regular fa-bell"></i>
    <i class="fa-solid fa-bars"></i>
    </div>
    </section>
    
    <section id="welcome">
        <div id="box-welcome">
            <div id="box-titles">
                <h1>Bem vindo !</h1>
                <p>3 novidades hoje</p>
            </div>
            <div id="box-round">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>
    </section>

    <section id="destaques">
        <div id="destaques-titulo">
            <h1>DESTAQUES</h1>
        </div>
        <div class="card">
            <div class="card-icon"><i class="fa-regular fa-star"></i></div>
            <div>
                <b>Top artigos</b>
                <p>12 publicados</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon"><i id="heart" class="fa-regular fa-heart"></i></div>
                <div>
                <b>favoritos</b>
                <p>8 salvos</p>
                </div>
            </div>
    </section>

</body>
</html>
